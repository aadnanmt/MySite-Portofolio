<div class="posts-grid">
    {% for post in posts %}
    <article>
        <a href="{{ url_for('blog.post', slug=post.slug) }}" class="log-entry-card">

            {% if post.cover %}
            <div class="entry-cover">
                <img src="{{ post.cover }}" alt="{{ post.title }}" loading="lazy"/>
            </div>
            {% endif %}

            <div class="entry-meta">
                <span>[{{ post.date }}]</span>
                <span>Adnan Slamet Wibowo</span>
            </div>

            <h2 class="entry-title">{{ post.title }}</h2>
            <p class="entry-desc">{{ post.desc | truncate(100) }}</p>

            {% if post.tags %}
            <div class="entry-tags">
                {% for tag in post.tags %}
                <span class="tag-chip">{{ tag }}</span>
                {% endfor %}
            </div>
            {% endif %}
        </a>
    </article>
    {% endfor %}
</div>
{% if show_blog_more %}
<div class="see-more-wrapper">
    <a href="{{ url_for('blog.index') }}" class="btn-secondary">
        READ MORE MY ARTICLES <i class="fas fa-arrow-right"></i>
    </a>
</div>
{% endif %}
