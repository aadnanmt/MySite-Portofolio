<div class="tech-stack-wrapper mt-large">
    <h3 class="stack-title" data-lang="tech-Stack"></h3>
    <div class="glass-card">
        <div class="tools-grid">
            {% for tool in skills.tools %}
            <div class="tool-item">
                <i class="{{ tool.icon }}"></i>
                <span>{{ tool.name }}</span>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
